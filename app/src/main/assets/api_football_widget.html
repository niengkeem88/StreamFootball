<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="color-scheme" content="dark" />
  <title>MatchPulse Live — Football Widget</title>

  <!-- API-Football / API-Sports widget script -->
  <script async defer src="https://cdn.api-sports.io/v3/widget.js"></script>

  <style>
    :root {
      --bg: #0B1220; /* dark app background */
      --card: #0F1724;
      --muted: #9AA4B2;
      --accent: #2B95F1; /* blue theme */
      --text: #E6EEF8;
    }
    html,body{height:100%;margin:0;padding:0;background:var(--bg);color:var(--text);}
    body{font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial;}
    /* Ensure widget uses full width and no horizontal overflow */
    #widget-root{box-sizing:border-box;max-width:100%;padding:0;margin:0;width:100%;overflow-x:hidden;}

    /* Tweak widget container appearance to blend with app */
    api-sports-widget, .api-sports-widget, .api-sports-container { width:100% !important; }
    .api-sports-widget { background: transparent !important; color: var(--text) !important; }
    /* Remove default margins/paddings that could create white bars */
    .api-sports-widget * { box-sizing: border-box; }

    /* Small responsive helpers */
    .mp-wrapper { width:100%; padding: 0 6px; }
    @media (min-width:600px){ .mp-wrapper{ padding: 0 12px; } }
  </style>
</head>
<body>
  <div id="widget-root">
    <div class="mp-wrapper">
      <!-- Games widget placeholder -->
      <api-sports-widget data-type="games"></api-sports-widget>

      <!-- Configuration for widgets: keep API key local to app asset -->
      <api-sports-widget data-type="config"
        data-key="%%FOOTBALL_API_KEY%%"
        data-sport="football"
        data-lang="en"
        data-theme="blue"
        data-show-errors="true"
      ></api-sports-widget>
    </div>
  </div>

  <script>
    // Basic guard: wait for widget library to initialize
    (function(){
      function safeInit(){
        try{
          if(window.APISPORTS && typeof window.APISPORTS.render === 'function'){
            // library ready - nothing else required; widgets auto-render
          } else {
            // Try again shortly
            setTimeout(safeInit, 250);
          }
        }catch(e){
          console.error('Widget init failed', e);
        }
      }
      safeInit();
    })();
  </script>

  <script>
    // Report content height to Android via AndroidWidgetBridge.postHeight(px)
    function reportWidgetHeight(){
      try{
        var h = Math.max(document.documentElement.scrollHeight || 0, document.body.scrollHeight || 0);
        if(window.AndroidWidgetBridge && typeof window.AndroidWidgetBridge.postHeight === 'function'){
          window.AndroidWidgetBridge.postHeight(h.toString());
        }
      }catch(e){
        // ignore
      }
    }

    // Debounced observer for dynamic content changes
    (function(){
      var timeout = null;
      var observer = new MutationObserver(function(){
        if(timeout) clearTimeout(timeout);
        timeout = setTimeout(reportWidgetHeight, 200);
      });
      try{
        observer.observe(document.body, { childList: true, subtree: true, attributes: true });
      }catch(e){}
      window.addEventListener('resize', function(){ if(timeout) clearTimeout(timeout); timeout = setTimeout(reportWidgetHeight, 200); });
      // Initial delayed attempts for async widget content
      setTimeout(reportWidgetHeight, 300);
      setTimeout(reportWidgetHeight, 1000);
      setTimeout(reportWidgetHeight, 2500);
    })();
  </script>
</body>
</html>
